
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gestão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a2332;
            --primary-light: #2a3544;
            --accent: #c8102e;
            --accent-hover: #a00d26;
            --text: #ffffff;
            --text-secondary: #b8bcc4;
            --border: #3a4556;
            --bg: #0f1419;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background: var(--primary);
            border-bottom: 2px solid var(--accent);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 70px;
            position: relative;
            z-index: 100;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 0;
            margin-left: auto;
            height: 100%;
            align-items: stretch;
        }

        .tab-button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0 2rem;
            cursor: pointer;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            border-right: 1px solid var(--border);
        }

        .tab-button:first-child {
            border-left: 1px solid var(--border);
        }

        .tab-button:hover {
            background: var(--primary-light);
            color: var(--text);
        }

        .tab-button.active {
            background: var(--accent);
            color: var(--text);
        }

        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
        }

        /* Content Area */
        .content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* iframe styling */
        .appsheet-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }

        /* Loading indicator */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-secondary);
        }

        .loading::after {
            content: '';
            display: block;
            width: 40px;
            height: 40px;
            margin: 1rem auto 0;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .nav-tabs {
                flex-wrap: wrap;
                height: auto;
            }

            .tab-button {
                flex: 1 1 auto;
                min-width: 120px;
                justify-content: center;
            }

            .header {
                height: auto;
                flex-wrap: wrap;
                padding: 1rem;
            }

            .logo {
                width: 100%;
                text-align: center;
                margin-bottom: 1rem;
            }
        }

        @media (max-width: 640px) {
            .tab-button {
                padding: 0.75rem 1rem;
                font-size: 0.85rem;
            }

            .header {
                padding: 0.75rem;
            }

            .logo {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">FIRE<span>APP</span></div>
            <nav class="nav-tabs">
                <button class="tab-button active" data-tab="comando">Comando</button>
                <button class="tab-button" data-tab="socorro">CH Socorro</button>
                <button class="tab-button" data-tab="viaturas">Viaturas</button>
                <button class="tab-button" data-tab="patrimonio">Patrimônio</button>
            </nav>
        </header>

        <main class="content">
            <div id="comando" class="tab-content active">
                <div class="loading">Carregando Comando...</div>
                <iframe class="appsheet-frame" src="https://www.appsheet.com/start/68a06b62-6dc0-4650-a68c-79977d2d2512#appName=AgendaSite-662732070&page=dashboard&table=Agenda&view=GESTOR" allow="camera; microphone; geolocation"></iframe>
            </div>

            <div id="socorro" class="tab-content">
                <div class="loading">Carregando CH Socorro...</div>
                <iframe class="appsheet-frame" src="https://www.appsheet.com/start/94fa4561-db89-4a81-aa48-07cd67c39ac4#appName=FireAppChSocorro-662732070&page=dashboard&table=Usu%C3%A1rios&view=CH+SOCORRO" allow="camera; microphone; geolocation"></iframe>
            </div>

            <div id="viaturas" class="tab-content">
                <div class="loading">Carregando Viaturas...</div>
                <iframe class="appsheet-frame" src="https://www.appsheet.com/start/dd4f0e1b-2f67-4339-9c3c-f11a519aaf68#appName=FireAppViaturas-662732070&page=dashboard&table=Viaturas&view=MENU" allow="camera; microphone; geolocation"></iframe>
            </div>

            <div id="patrimonio" class="tab-content">
                <div class="loading">Carregando Patrimônio...</div>
                <iframe class="appsheet-frame" src="https://www.appsheet.com/start/d5550fab-9bbb-4401-9b96-f8b214b5f9f3#appName=FireAppPatrim%C3%B4nio-662732070&page=dashboard&table=Patrim%C3%B4nio&view=MENU" allow="camera; microphone; geolocation"></iframe>
            </div>
        </main>
    </div>

    <script>
        // Tab switching logic
        const tabButtons = document.querySelectorAll('.tab-button');
        const tabContents = document.querySelectorAll('.tab-content');

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                const targetTab = button.dataset.tab;

                // Remove active class from all buttons and contents
                tabButtons.forEach(btn => btn.classList.remove('active'));
                tabContents.forEach(content => content.classList.remove('active'));

                // Add active class to clicked button and corresponding content
                button.classList.add('active');
                document.getElementById(targetTab).classList.add('active');
            });
        });

        // Hide loading indicators when iframes load
        const iframes = document.querySelectorAll('.appsheet-frame');
        iframes.forEach(iframe => {
            iframe.addEventListener('load', () => {
                const loading = iframe.previousElementSibling;
                if (loading && loading.classList.contains('loading')) {
                    loading.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
